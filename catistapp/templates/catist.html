<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-50 font-sans" x-data="gestorApp()">

    <nav class="bg-indigo-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <h1 class="text-xl font-bold italic">CatistApp</h1>
            <span class="text-sm opacity-75">Flask + Tailwind + Alpine</span>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">















        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" x-data="{ categorias: {{ categorias}} }">

            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                    <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg mr-2 italic">#</span>
                    Categorías
                </h2>

                <div class="flex gap-2 mb-6">
                    <input type="text" x-model="nuevaCat" placeholder="Nueva categoría..."
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
                    <button @click="agregarCategoria()"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-bold">+</button>
                </div>

                <div>
                    <ul class="space-y-2">
                        <template x-for="(cat, index) in categorias" :key="index">

                            <li class="flex justify-between items-center bg-gray-50 p-3 rounded-lg group">
                                <span x-value="cat.id" x-text="cat.nombre" class="font-medium text-gray-600"></span>
                                <!-- <button @click="eliminarCategoria(index)" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity">
                                Borrar
                            </button> -->
                            </li>
                        </template>
                    </ul>
                    <template x-if="categorias.length === 0">
                        <p class="text-gray-500">No hay categorías disponibles.</p>
                    </template>
                </div>
            </section>

            <section class="lg:col-span-2 space-y-6">

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 text-gray-700 italic decoration-indigo-300">Agregar Nuevo Item
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" x-model="nuevoItemNombre" placeholder="Nombre del objeto..."
                            class="p-2 border rounded-lg">
                        <input type="text" x-model="nuevoItemDescripcion" placeholder="Descripción del objeto..."
                            class="p-2 border rounded-lg">
                        <input type="text" x-model="nuevoItemImagen" placeholder="URL de la imagen (opcional)"
                            class="p-2 border rounded-lg">
                        <select x-model="nuevoItemCat" class="p-2 border rounded-lg">
                            <option value="">Selecciona Categoría</option>
                            <template x-for="(cat, index) in categorias" :key="index">
                                <option :value="cat.id" x-text="cat.nombre"></option>
                            </template>
                        </select>
                        <button @click="agregarItem()"
                            class="bg-green-600 text-white p-2 rounded-lg hover:bg-green-700 font-bold">
                            Guardar Item
                        </button>
                    </div>
                </div>

                <div x-data="{
                            items: {{ items}},
                        categorias: {{ categorias}},
                        filtro: 'todos',

                        get itemsFiltrados() {
                            if (this.filtro === 'todos') {
                                return this.items;
                            }                                                        
                            return this.items.filter(item => {return item.categoria === this.filtro});
                        }}">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold text-gray-700">Listado de Elementos</h2>
                        <select x-model="filtro" class="p-2 border rounded-lg text-sm bg-gray-50">
                            <option value="todos">Todas las categorías</option>
                            <template x-for="(cat, index) in categorias" :key="index">
                                <option :value="cat.nombre" x-text="'Filtrar por: ' + cat.nombre"></option>
                            </template>
                        </select>
                    </div>

                    <div class="min-h-screen bg-slate-950 p-8">
                        <template x-for="(item, index) in itemsFiltrados" :key="item.id">
                            <div class="bg-gray-800 text-white p-4 rounded-lg mb-4">
                                <h3 class="text-xl font-bold mb-2" x-text="item.nombre"></h3>
                                <p class="mb-2" x-text="item.descripcion"></p>
                                <p class="text-sm italic text-gray-400 mb-2" x-text="'Categoría: ' + item.categoria">
                                </p>
                                <template x-if="item.imagen">
                                    <img :src="item.imagen" alt="Imagen del item" class="w-full h-auto rounded-lg">
                                </template>
                            </div>

                        </template>
                    </div>
                </div>
                </div>
</body>
<script>
    function gestorApp() {
        return {
            nuevaCat: '',
            nuevoItemNombre: '',
            nuevoItemCat: '',
            nuevoItemDescripcion: '',
            nuevoItemImagen: '',
            lista: [], // Tu lista de categorías actual

            async agregarCategoria() {
                if (!this.nuevaCat.trim()) return;

                try {
                    const response = await fetch('/api/addcategoria', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',

                        },
                        body: JSON.stringify({ nombre: this.nuevaCat })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Añadimos el nuevo objeto a la lista local para que se vea al instante
                        // this.categorias.push(this.nuevaCat);
                        // this.nuevaCat = ''; // Limpiamos el input
                        window.location.reload();
                    }
                } catch (error) {
                    console.error("Error al guardar:", error);
                }
            },
            async agregarItem() {
                if (!this.nuevoItemNombre.trim() || !this.nuevoItemCat) return;
                console.log("Intentando agregar item:", {
                    nombre: this.nuevoItemNombre,
                    categoria: this.nuevoItemCat,
                    descripcion: this.nuevoItemDescripcion,
                    imagen: this.nuevoItemImagen
                });
                try {
                    const response = await fetch('/api/additem', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            nombre: this.nuevoItemNombre,
                            categoria: this.nuevoItemCat,
                            descripcion: this.nuevoItemDescripcion,
                            imagen: this.nuevoItemImagen
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Aquí podrías agregar el nuevo item a una lista local si quieres mostrarlo al instante
                        window.location.reload();
                        // this.nuevoItemNombre = ''; // Limpiamos el input
                        // this.nuevoItemCat = ''; // Reseteamos el select
                        // this.nuevoItemDescripcion = '';
                        // this.nuevoItemImagen = '';
                    }
                } catch (error) {
                    console.error("Error al guardar el item:", error);
                }
            }
        }
    }
</script>

</html>
